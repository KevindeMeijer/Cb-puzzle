        <script>
            document.addEventListener("DOMContentLoaded", async function () {
                const loading = document.getElementById("__bundler_loading");
                function setStatus(msg) {
                    if (loading) loading.textContent = msg;
                }

                // Error sink persists across replaceWith since it's on window, not the DOM.
                window.addEventListener(
                    "error",
                    function (e) {
                        var p = document.body || document.documentElement;
                        var d =
                            document.getElementById("__bundler_err") ||
                            p.appendChild(document.createElement("div"));
                        d.id = "__bundler_err";
                        d.style.cssText =
                            "position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto";
                        d.textContent =
                            (d.textContent
                                ? d.textContent + String.fromCharCode(10)
                                : "") +
                            "[bundle] " +
                            (e.message || e.type) +
                            (e.filename
                                ? " (" +
                                  e.filename.slice(0, 60) +
                                  ":" +
                                  e.lineno +
                                  ")"
                                : "");
                    },
                    true,
                );

                try {
                    const manifestEl = document.querySelector(
                        'script[type="__bundler/manifest"]',
                    );
                    const templateEl = document.querySelector(
                        'script[type="__bundler/template"]',
                    );
                    if (!manifestEl || !templateEl) {
                        setStatus("Error: missing bundle data");
                        console.error(
                            "[bundler] Missing script tags — manifestEl:",
                            !!manifestEl,
                            "templateEl:",
                            !!templateEl,
                        );
                        return;
                    }

                    const manifest = JSON.parse(manifestEl.textContent);
                    let template = JSON.parse(templateEl.textContent);

                    const uuids = Object.keys(manifest);
                    setStatus("Unpacking " + uuids.length + " assets...");

                    const blobUrls = {};
                    await Promise.all(
                        uuids.map(async (uuid) => {
                            const entry = manifest[uuid];
                            try {
                                const binaryStr = atob(entry.data);
                                const bytes = new Uint8Array(binaryStr.length);
                                for (let i = 0; i < binaryStr.length; i++)
                                    bytes[i] = binaryStr.charCodeAt(i);

                                let finalBytes = bytes;
                                if (entry.compressed) {
                                    if (
                                        typeof DecompressionStream !==
                                        "undefined"
                                    ) {
                                        const ds = new DecompressionStream(
                                            "gzip",
                                        );
                                        const writer = ds.writable.getWriter();
                                        const reader = ds.readable.getReader();
                                        writer.write(bytes);
                                        writer.close();
                                        const chunks = [];
                                        let totalLen = 0;
                                        while (true) {
                                            const { done, value } =
                                                await reader.read();
                                            if (done) break;
                                            chunks.push(value);
                                            totalLen += value.length;
                                        }
                                        finalBytes = new Uint8Array(totalLen);
                                        let offset = 0;
                                        for (const chunk of chunks) {
                                            finalBytes.set(chunk, offset);
                                            offset += chunk.length;
                                        }
                                    } else {
                                        console.warn(
                                            "DecompressionStream not available, asset " +
                                                uuid +
                                                " may not render",
                                        );
                                    }
                                }

                                blobUrls[uuid] = URL.createObjectURL(
                                    new Blob([finalBytes], {
                                        type: entry.mime,
                                    }),
                                );
                            } catch (err) {
                                console.error(
                                    "Failed to decode asset " + uuid + ":",
                                    err,
                                );
                                blobUrls[uuid] = URL.createObjectURL(
                                    new Blob([], { type: entry.mime }),
                                );
                            }
                        }),
                    );

                    const extResEl = document.querySelector(
                        'script[type="__bundler/ext_resources"]',
                    );
                    const extResources = extResEl
                        ? JSON.parse(extResEl.textContent)
                        : [];
                    const resourceMap = {};
                    for (const entry of extResources) {
                        if (blobUrls[entry.uuid])
                            resourceMap[entry.id] = blobUrls[entry.uuid];
                    }

                    setStatus("Rendering...");
                    for (const uuid of uuids)
                        template = template.split(uuid).join(blobUrls[uuid]);

                    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
                    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
                    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
                    template = template
                        .replace(/\s+integrity="[^"]*"/gi, "")
                        .replace(/\s+crossorigin="[^"]*"/gi, "");

                    const resourceScript =
                        "<script>window.__resources = " +
                        JSON.stringify(resourceMap)
                            .split("</" + "script>")
                            .join("<\\/" + "script>") +
                        ";</" +
                        "script>";
                    // Inject after <head> so the DOCTYPE stays first; prepending the script
                    // would push the parser into quirks mode. DOMParser always emits a <head>
                    // (synthesizing one if the source HTML omitted it) but may carry
                    // attributes through, so match the full opening tag. slice() rather than
                    // replace() keeps us clear of $-pattern substitution in resourceScript.
                    const headOpen = template.match(/<head[^>]*>/i);
                    if (headOpen) {
                        const i = headOpen.index + headOpen[0].length;
                        template =
                            template.slice(0, i) +
                            resourceScript +
                            template.slice(i);
                    }

                    // Parse the template and swap the root element. Scripts inserted via
                    // DOMParser/replaceWith are inert per spec — re-create each with
                    // createElement so they execute, awaiting onload for src scripts to
                    // preserve ordering (React before ReactDOM before Babel before text/babel).
                    const doc = new DOMParser().parseFromString(
                        template,
                        "text/html",
                    );
                    document.documentElement.replaceWith(doc.documentElement);
                    const dead = Array.from(document.scripts);
                    for (const old of dead) {
                        const s = document.createElement("script");
                        for (const a of old.attributes)
                            s.setAttribute(a.name, a.value);
                        s.textContent = old.textContent;
                        // text/babel scripts with a src: fetch and inline. transformScriptTags
                        // does XHR against the src, but blob:null/ from a file:// origin is
                        // silently dropped. Inlining makes it a plain inline babel script,
                        // which transformScriptTags handles unconditionally.
                        if (
                            (s.type === "text/babel" ||
                                s.type === "text/jsx") &&
                            s.src
                        ) {
                            const r = await fetch(s.src);
                            s.textContent = await r.text();
                            s.removeAttribute("src");
                        }
                        const p = s.src
                            ? new Promise(function (r) {
                                  s.onload = s.onerror = r;
                              })
                            : null;
                        old.replaceWith(s);
                        if (p) await p;
                    }
                    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
                    // which fired before we swapped the document. Trigger manually if present.
                    if (
                        window.Babel &&
                        typeof window.Babel.transformScriptTags === "function"
                    ) {
                        window.Babel.transformScriptTags();
                    }
                } catch (err) {
                    setStatus("Error unpacking: " + err.message);
                    console.error("Bundle unpack error:", err);
                }
            });
        </script>

t-family: 'Mozilla Headline';\n  font-style: normal;\n  font-weight: 600;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"88599883-1122-48b6-bd61-e9914d94054c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Mozilla Headline';\n  font-style: normal;\n  font-weight: 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"f4e9825e-387d-4b44-af04-5eadc5cfc12b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Mozilla Headline';\n  font-style: normal;\n  font-weight: 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"88599883-1122-48b6-bd61-e9914d94054c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    @keyframes revealIn {\n      0% { opacity: 0; transform: translateY(14px) scale(0.97); }\n      100% { opacity: 1; transform: translateY(0) scale(1); }\n    }\n    @keyframes blink {\n      0%, 100% { opacity: 1; }\n      50% { opacity: 0; }\n    }\n    @keyframes placeholderCarousel {\n      0% { transform: translateY(-100%); opacity: 0; }\n      100% { transform: translateY(0); opacity: 1; }\n    }\n    html, body { margin: 0; background: #003615; }\n    ::selection { background: #00e069; color: #003615; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh; width:100%; background:#003615; color:#00e069; font-family:'Figtree', sans-serif; display:flex; flex-direction:column; align-items:center; padding:88px 20px 56px; box-sizing:border-box;\">\n  <sc-if value=\"{{ notDestroyed }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"width:100%; max-width:640px; position:relative;\">\n    <div style=\"{{ docStyle }}\">\n\n      <div style=\"font-size:12px; letter-spacing:0.18em; color:#00e069; opacity:0.6; margin-bottom:28px; text-transform:uppercase;\">CENTER OF EXCELLENCE DESIGN · DOSSIER NR. 23072026<\u002Fdiv>\n      <h1 style=\"font-family:'Mozilla Headline', sans-serif; font-size:clamp(34px, 7vw, 56px); font-weight:700; letter-spacing:-0.01em; line-height:1.05; margin:0 0 20px;\">SAVE&nbsp;THE&nbsp;DATE<\u002Fh1>\n      <p style=\"font-size:16px; line-height:1.6; color:#00e069; opacity:0.85; max-width:480px; margin:0 0 10px;\">De bestemming van dit jaar is verzegeld. Negen omschrijvingen, negen letters. Los ze op en leg ze op hun plek om erachter te komen waar we dit jaar naartoe gaan. Meer informatie volgt in de week voor het uitje...<\u002Fp>\n\n      \n\n      <!-- 9 CLUES : elke code is een andere techniek -->\n      <div style=\"display:flex; flex-direction:column;\">\n\n        <div style=\"{{ rowStyle }}\">\n          <div style=\"{{ badgeWrap }}\">\n            <div style=\"width:32px; height:32px; border-radius:50%; border:1.5px solid #00e069; display:flex; align-items:center; justify-content:center; font-family:'Mozilla Headline', sans-serif; font-size:16px; font-weight:700; box-sizing:border-box;\">G<\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"{{ clueTextStyle }}\">Kondigt het volgende programma aan, met een glimlach die nooit wegzakt. (v)<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"{{ rowStyle }}\">\n          <div style=\"{{ badgeWrap }}\">\n            <div style=\"display:flex; gap:5px; align-items:center;\">\n              <div style=\"width:7px; height:7px; border-radius:50%; background:#00e069;\"><\u002Fdiv>\n              <div style=\"width:7px; height:7px; border-radius:50%; background:#00e069;\"><\u002Fdiv>\n              <div style=\"width:7px; height:7px; border-radius:50%; background:#00e069;\"><\u002Fdiv>\n              <div style=\"width:18px; height:7px; border-radius:2px; background:#00e069;\"><\u002Fdiv>\n              <div style=\"width:18px; height:7px; border-radius:2px; background:#00e069;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"{{ clueTextStyle }}\">Onzichtbaar, maar iedereen hoort het door de muren heen.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"{{ rowStyle }}\">\n          <div style=\"{{ badgeWrap }}\"><span style=\"font-size:16px; font-weight:700; border:1.5px solid #00e069; border-radius:3px; padding:4px 9px;\">3<sup style=\"font-size:0.7em;\">2<\u002Fsup><\u002Fspan><\u002Fdiv>\n          <p style=\"{{ clueTextStyle }}\">Licht metaal, te vinden in blikjes, folie en vliegtuigen.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"{{ rowStyle }}\">\n          <div style=\"{{ badgeWrap }}\"><span style=\"font-family:'Mozilla Headline', sans-serif; font-size:16px; font-weight:700; letter-spacing:0.1em; border:1.5px solid #00e069; border-radius:3px; padding:4px 9px;\">I<\u002Fspan><\u002Fdiv>\n          <p style=\"{{ clueTextStyle }}\">Gemist? Geen nood, hij komt straks nog een keer voorbij.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"{{ rowStyle }}\">\n          <div style=\"{{ badgeWrap }}\">\n            <div style=\"width:32px; height:32px; display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr); border:1.5px solid #00e069; border-radius:4px; padding:4px; box-sizing:border-box;\">\n              <div style=\"grid-row:1; grid-column:1; width:6px; height:6px; border-radius:50%; background:#00e069; justify-self:center; align-self:center;\"><\u002Fdiv>\n              <div style=\"grid-row:1; grid-column:3; width:6px; height:6px; border-radius:50%; background:#00e069; justify-self:center; align-self:center;\"><\u002Fdiv>\n              <div style=\"grid-row:2; grid-column:2; width:6px; height:6px; border-radius:50%; background:#00e069; justify-self:center; align-self:center;\"><\u002Fdiv>\n              <div style=\"grid-row:3; grid-column:1; width:6px; height:6px; border-radius:50%; background:#00e069; justify-self:center; align-self:center;\"><\u002Fdiv>\n              <div style=\"grid-row:3; grid-column:3; width:6px; height:6px; border-radius:50%; background:#00e069; justify-self:center; align-self:center;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"{{ clueTextStyle }}\">Verander van kanaal en je verlaat mij voor een ander.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"{{ rowStyle }}\">\n          <div style=\"{{ badgeWrap }}\"><span style=\"font-size:16px; font-weight:700; letter-spacing:0.06em; border:1.5px solid #00e069; border-radius:3px; padding:4px 9px;\">10<\u002Fspan><\u002Fdiv>\n          <p style=\"{{ clueTextStyle }}\">Fluister erin en duizenden horen het terug.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"{{ rowStyle }}\">\n          <div style=\"{{ badgeWrap }}\"><span style=\"font-size:16px; font-weight:700; letter-spacing:0.06em; border:1.5px solid #00e069; border-radius:3px; padding:4px 9px;\">THCA<\u002Fspan><\u002Fdiv>\n          <p style=\"{{ clueTextStyle }}\">Dit programma werd in eerste instantie afgewezen door de NPO, en is nu al 16 jaar op TV.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"{{ rowStyle }}\">\n          <div style=\"{{ badgeWrap }}\"><div style=\"width:26px; height:26px; border:2px solid #00e069; transform:rotate(45deg); box-sizing:border-box;\"><\u002Fdiv><\u002Fdiv>\n          <p style=\"{{ clueTextStyle }}\">Ze reizen door de lucht, maar deze worden nooit nat.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"{{ lastRowStyle }}\">\n          <div style=\"{{ badgeWrap }}\">\n            <div style=\"width:32px; height:32px; border-radius:50%; border:2px solid #00e069; position:relative; box-sizing:border-box;\">\n              <div style=\"position:absolute; left:50%; bottom:50%; width:2px; height:12px; background:#00e069; transform-origin:bottom center; transform:translateX(-50%) rotate(180deg);\"><\u002Fdiv>\n              <div style=\"position:absolute; left:50%; top:50%; width:4px; height:4px; border-radius:50%; background:#00e069; transform:translate(-50%,-50%);\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"{{ clueTextStyle }}\">Zit thuis op de bank en telt mee voor de cijfers van gisteravond.<\u002Fp>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <div style=\"height:1px; background:#00e069; opacity:0.3; margin:0;\"><\u002Fdiv>\n\n      <!-- FINAL ANSWER -->\n      <sc-if value=\"{{ notFailed }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"position:relative; margin-top:20px;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:16px; gap:12px;\">\n          <span style=\"font-size:13px; font-weight:700; letter-spacing:0.1em;\">BESTEMMING<\u002Fspan>\n          <span style=\"font-size:11px; letter-spacing:0.1em; color:{{ statusColor }};\">{{ status }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:10px;\">\n          <div style=\"position:relative; flex:1; display:flex;\">\n            <input type=\"text\" placeholder=\"\" value=\"{{ vFinal }}\" onchange=\"{{ onVFinal }}\" onkeydown=\"{{ onKeyFinal }}\" readonly=\"{{ sFinal }}\" style=\"{{ inputStyle }}\">\n            <sc-if value=\"{{ notVFinal }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"{{ placeholderMaskStyle }}\">\n                <span key=\"{{ placeholderIndex }}\" style=\"{{ placeholderSpanStyle }}\">{{ placeholderText }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <button onclick=\"{{ checkFinal }}\" style=\"padding:14px 22px; font-family:'Figtree', sans-serif; font-weight:700; font-size:14px; letter-spacing:0.08em; text-transform:uppercase; border:1.5px solid #00e069; border-radius:4px; background:#00e069; color:#003615; cursor:pointer;\">Check<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ errFinal }}\" hint-placeholder-val=\"{{ false }}\">\n          <p style=\"font-size:12px; color:#ff5c5c; margin:10px 0 0;\">Niet correct.<\u002Fp>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ notSFinal }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex; align-items:center; gap:10px; margin-top:18px;\">\n            <span style=\"font-size:11px; letter-spacing:0.1em; color:#00e069; opacity:0.55; text-transform:uppercase;\">Kansen<\u002Fspan>\n            <div style=\"display:flex; gap:8px;\">\n              <sc-for list=\"{{ attemptBoxes }}\" as=\"box\" hint-placeholder-count=\"3\">\n                <div style=\"{{ box.style }}\">{{ box.label }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- FAILURE -->\n      <sc-if value=\"{{ failed }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"animation:revealIn 0.7s ease-out both; text-align:center; border:1px solid #e03800; border-radius:6px; padding:56px 32px; background:#360900; margin-top:20px;\">\n          <div style=\"font-size:12px; letter-spacing:0.18em; color:#e03800; opacity:0.8; margin-bottom:18px; text-transform:uppercase;\">Toegang geweigerd<\u002Fdiv>\n          <div style=\"font-family:'Mozilla Headline', sans-serif; font-size:clamp(34px, 8vw, 56px); font-weight:700; letter-spacing:-0.01em; margin-bottom:18px; color:#e03800; text-shadow:0 0 24px rgba(224,56,0,0.5);\">FOUTE BESTEMMING<\u002Fdiv>\n          <div style=\"height:1px; background:#e03800; opacity:0.35; margin:0 0 28px;\"><\u002Fdiv>\n          <p style=\"font-size:14px; color:#e03800; opacity:0.85; margin:0 0 22px;\">Alle drie de pogingen zijn gebruikt. Het dossier wordt vernietigd.<\u002Fp>\n          <p style=\"font-size:12px; color:#e03800; opacity:0.7; letter-spacing:0.05em; margin:0;\">Dit document vernietigt zichzelf over {{ failCountdown }} seconden.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- REVEAL -->\n      <sc-if value=\"{{ sFinal }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"animation:revealIn 0.7s ease-out both; text-align:center; border:1px solid #00e069; border-radius:6px; padding:56px 32px; background:rgba(0,224,105,0.06); margin-top:44px;\">\n          <div style=\"font-size:12px; letter-spacing:0.18em; color:#00e069; opacity:0.7; margin-bottom:18px; text-transform:uppercase;\">Dossier ontgrendeld<\u002Fdiv>\n          <div style=\"font-family:'Mozilla Headline', sans-serif; font-size:clamp(38px, 9vw, 68px); font-weight:700; letter-spacing:-0.01em; margin-bottom:18px; color:#00e069; text-shadow:0 0 24px rgba(0,224,105,0.5);\">HILVERSUM<\u002Fdiv>\n          <div style=\"font-size:14px; letter-spacing:0.1em; color:#00e069; opacity:0.7; margin-bottom:36px;\">52.2242° N — 5.1758° E<\u002Fdiv>\n          <div style=\"height:1px; background:#00e069; opacity:0.3; margin:0 0 28px;\"><\u002Fdiv>\n          <div style=\"font-size:13px; letter-spacing:0.1em; color:#00e069; opacity:0.7; text-transform:uppercase; margin-bottom:8px;\">Datum<\u002Fdiv>\n          <div style=\"font-size:22px; font-weight:700; margin-bottom:28px;\">23 juli 2026<\u002Fdiv>\n          <p style=\"font-size:14px; color:#00e069; opacity:0.7; margin:0 0 22px;\">Verdere instructies volgen zodra de operatie live gaat. Houd deze dag vrij.<\u002Fp>\n          <p style=\"font-size:12px; color:#00e069; opacity:0.55; letter-spacing:0.05em; margin:0;\">Dit document vernietigt zichzelf over {{ countdown }} seconden.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ showFooterHint }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"font-size:11px; letter-spacing:0.1em; color:#00e069; opacity:0.45; text-align:center; margin-top:64px; text-transform:uppercase;\">Dit document vernietigt zichzelf zodra de bestemming onthuld is.<\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n    \n\n    <sc-if value=\"{{ shredActive }}\" hint-placeholder-val=\"{{ false }}\">\n      <sc-for list=\"{{ strips }}\" as=\"st\" hint-placeholder-count=\"8\">\n        <div style=\"{{ st }}\">\n          <div style=\"position:absolute; top:10%; left:15%; right:15%; height:8px; background:rgba(0,224,105,0.12); border-radius:2px;\"><\u002Fdiv>\n          <div style=\"position:absolute; top:24%; left:20%; right:20%; height:8px; background:rgba(0,224,105,0.12); border-radius:2px;\"><\u002Fdiv>\n          <div style=\"position:absolute; top:38%; left:15%; right:15%; height:8px; background:rgba(0,224,105,0.12); border-radius:2px;\"><\u002Fdiv>\n          <div style=\"position:absolute; top:52%; left:25%; right:25%; height:8px; background:rgba(0,224,105,0.12); border-radius:2px;\"><\u002Fdiv>\n          <div style=\"position:absolute; top:66%; left:18%; right:18%; height:8px; background:rgba(0,224,105,0.12); border-radius:2px;\"><\u002Fdiv>\n          <div style=\"position:absolute; top:80%; left:22%; right:22%; height:8px; background:rgba(0,224,105,0.12); border-radius:2px;\"><\u002Fdiv>\n          <div style=\"position:absolute; top:92%; left:15%; right:15%; height:8px; background:rgba(0,224,105,0.12); border-radius:2px;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fsc-if><\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    vFinal: '', sFinal: false, errFinal: false, shredPhase: 0,\n    countdown: 30, destroyed: false, attemptsUsed: 0, placeholderIndex: 0,\n    failed: false, failCountdown: 10,\n  };\n\n  KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a','Enter'];\n  konamiIndex = 0;\n\n  CITIES = ['AMSTERDAM','ROTTERDAM','UTRECHT','EINDHOVEN','GRONINGEN','TILBURG','MAASTRICHT','NIJMEGEN','HAARLEM','BREDA','ARNHEM','ZWOLLE','DELFT','LEIDEN'];\n\n  componentDidMount() {\n    this._placeholderInterval = setInterval(() => {\n      this.setState((s) => ({ placeholderIndex: (s.placeholderIndex + 1) % this.CITIES.length }));\n    }, 4000);\n    this._onKonamiKeydown = (e) => {\n      const key = e.key;\n      const expected = this.KONAMI[this.konamiIndex];\n      const matches = key === expected || (key.length === 1 && key.toLowerCase() === expected.toLowerCase());\n      if (matches) {\n        this.konamiIndex += 1;\n        if (this.konamiIndex === this.KONAMI.length) {\n          this.konamiIndex = 0;\n          this.revealAnswer();\n        }\n      } else {\n        const first = this.KONAMI[0];\n        this.konamiIndex = (key === first) ? 1 : 0;\n      }\n    };\n    window.addEventListener('keydown', this._onKonamiKeydown);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('keydown', this._onKonamiKeydown);\n    if (this._countdownInterval) clearInterval(this._countdownInterval);\n    if (this._placeholderInterval) clearInterval(this._placeholderInterval);\n    if (this._failInterval) clearInterval(this._failInterval);\n  }\n\n  norm(v) {\n    return (v || '').toUpperCase().replace(/[^A-Z]/g, '');\n  }\n\n  revealAnswer = () => {\n    this.setState({ vFinal: 'HILVERSUM', sFinal: true, errFinal: false });\n    this.startCountdown();\n  };\n\n  checkFinal = () => {\n    if (this.state.attemptsUsed >= 3) return;\n    if (this.norm(this.state.vFinal) === 'HILVERSUM') {\n      this.setState({ sFinal: true, errFinal: false });\n      this.startCountdown();\n    } else {\n      const nextUsed = Math.min(3, this.state.attemptsUsed + 1);\n      this.setState({ errFinal: true, attemptsUsed: nextUsed });\n      if (nextUsed >= 3) {\n        this.setState({ failed: true });\n        this.startFailCountdown();\n      }\n    }\n  };\n\n  startCountdown = () => {\n    this.setState({ countdown: 30 });\n    if (this._countdownInterval) clearInterval(this._countdownInterval);\n    this._countdownInterval = setInterval(() => {\n      this.setState((s) => {\n        const next = s.countdown - 1;\n        if (next <= 0) {\n          clearInterval(this._countdownInterval);\n          this.runShred();\n          return { countdown: 0 };\n        }\n        return { countdown: next };\n      });\n    }, 1000);\n  };\n\n  runShred() {\n    setTimeout(() => {\n      this.setState({ shredPhase: 1 });\n      setTimeout(() => {\n        this.setState({ shredPhase: 2 });\n        setTimeout(() => {\n          this.setState({ destroyed: true });\n        }, 1500);\n      }, 60);\n    }, 400);\n  }\n\n  startFailCountdown = () => {\n    this.setState({ failCountdown: 10 });\n    if (this._failInterval) clearInterval(this._failInterval);\n    this._failInterval = setInterval(() => {\n      this.setState((s) => {\n        const next = s.failCountdown - 1;\n        if (next <= 0) {\n          clearInterval(this._failInterval);\n          this.runShred();\n          return { failCountdown: 0 };\n        }\n        return { failCountdown: next };\n      });\n    }, 1000);\n  };\n\n  buildStrips(phase, total) {\n    const strips = [];\n    for (let i = 0; i < total; i++) {\n      const pct = 100 / total;\n      const leftPct = i * pct;\n      const rightPct = 100 - (i + 1) * pct;\n      const rotate = (i % 2 === 0 ? 1 : -1) * (4 + i * 1.8);\n      const fallVh = 130 + i * 8;\n      const delay = i * 55;\n      strips.push({\n        position: 'absolute', inset: 0, overflow: 'hidden', pointerEvents: 'none', zIndex: 5,\n        clipPath: `inset(0 ${rightPct}% 0 ${leftPct}%)`,\n        borderRight: i < total - 1 ? '1px solid rgba(0,224,105,0.3)' : 'none',\n        background: '#003615',\n        transition: `transform 1100ms cubic-bezier(.55,0,.85,0.15) ${delay}ms, opacity 900ms ease-in ${delay + 300}ms`,\n        transform: phase >= 2 ? `translateY(${fallVh}vh) rotate(${rotate}deg)` : 'translateY(0) rotate(0deg)',\n        opacity: phase >= 2 ? 0 : 1,\n      });\n    }\n    return strips;\n  }\n\n  onKeyFinal = (e) => { if (e.key === 'Enter') this.checkFinal(); };\n  onVFinal = (e) => this.setState({ vFinal: e.target.value, errFinal: false });\n\n  renderVals() {\n    const s = this.state;\n\n    const rowStyle = { display: 'flex', flexDirection: 'row', alignItems: 'center', gap: '20px', padding: '20px 4px', borderBottom: '1px solid rgba(0,224,105,0.25)' };\n    const lastRowStyle = { ...rowStyle, borderBottom: 'none' };\n    const badgeWrap = { flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', minWidth: '32px' };\n    const clueTextStyle = { fontSize: '15px', lineHeight: 1.5, color: '#00e069', opacity: 0.9, margin: 0 };\n\n    let status = '';\n    let statusColor = 'rgba(0,224,105,0.55)';\n    if (s.sFinal) { status = '\\u2713 ONTHULD'; statusColor = '#00e069'; }\n    else if (s.errFinal) { status = 'NIET CORRECT'; statusColor = '#ff5c5c'; }\n\n    let borderColor = 'rgba(0,224,105,0.4)';\n    if (s.errFinal) borderColor = '#ff5c5c';\n    if (s.sFinal) borderColor = '#00e069';\n\n    const inputStyle = {\n      flex: 1,\n      width: '100%',\n      padding: '14px 16px',\n      fontFamily: \"'Figtree', sans-serif\",\n      fontSize: '16px',\n      letterSpacing: '0.15em',\n      textTransform: 'uppercase',\n      border: '1.5px solid ' + borderColor,\n      borderRadius: '4px',\n      background: 'transparent',\n      color: '#00e069',\n      outline: 'none',\n      boxSizing: 'border-box',\n      caretColor: '#00e069',\n    };\n\n    const strips = this.buildStrips(s.shredPhase, 8);\n    const docStyle = { visibility: s.shredPhase >= 1 ? 'hidden' : 'visible' };\n    const shredActive = s.shredPhase >= 1;\n    const notDestroyed = !s.destroyed;\n    const notSFinal = !s.sFinal;\n    const notFailed = !s.failed;\n    const showFooterHint = !s.sFinal && !s.failed;\n\n    const attemptBoxes = [0, 1, 2].map((i) => {\n      const used = i < s.attemptsUsed;\n      return {\n        label: used ? '\\u00d7' : '',\n        style: {\n          width: '26px', height: '26px', borderRadius: '4px', boxSizing: 'border-box',\n          display: 'flex', alignItems: 'center', justifyContent: 'center',\n          fontSize: '15px', fontWeight: 700,\n          border: '1.5px solid ' + (used ? '#ff5c5c' : 'rgba(0,224,105,0.4)'),\n          color: used ? '#ff5c5c' : '#00e069',\n        },\n      };\n    });\n\n    const placeholderText = this.CITIES[s.placeholderIndex];\n    const notVFinal = !s.vFinal;\n    const placeholderMaskStyle = {\n      position: 'absolute', inset: 0, display: 'flex', alignItems: 'center',\n      overflow: 'hidden', pointerEvents: 'none', paddingLeft: '16px', boxSizing: 'border-box',\n    };\n    const placeholderSpanStyle = {\n      display: 'inline-block', fontFamily: \"'Figtree', sans-serif\", fontSize: '16px',\n      letterSpacing: '0.15em', textTransform: 'uppercase', color: '#6b7280', opacity: 1,\n      animation: 'placeholderCarousel 0.5s ease-out both',\n    };\n\n    return {\n      strips, docStyle, shredActive, notDestroyed, notSFinal, countdown: s.countdown, attemptBoxes, placeholderText,\n      notVFinal, placeholderMaskStyle, placeholderSpanStyle, placeholderIndex: s.placeholderIndex,\n      notFailed, failed: s.failed, failCountdown: s.failCountdown, showFooterHint,\n      vFinal: s.vFinal, sFinal: s.sFinal, errFinal: s.errFinal,\n      onVFinal: this.onVFinal, onKeyFinal: this.onKeyFinal, checkFinal: this.checkFinal,\n      status, statusColor, inputStyle,\n      rowStyle, lastRowStyle, badgeWrap, clueTextStyle,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
        </script>
